#alias air='$(go env GOPATH)/bin/air'

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # CGO is required: app-scanner links against libpcap. The container
  # already ships libpcap-dev (see sirius-engine/Dockerfile), so the
  # in-container live-rebuild succeeds with the same flags as the
  # release build.
  args_bin = []
  bin = "./tmp/main"
  cmd = "CGO_ENABLED=1 go build -o ./tmp/main ./main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  # Empty include_dir means "watch root + all subdirs except exclude_dir".
  # We need this because the scanner entry point is ./main.go at the
  # project root; an explicit include_dir list would silently miss
  # changes to it.
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = true

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true